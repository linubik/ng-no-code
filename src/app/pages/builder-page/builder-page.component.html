<div class="app-container">
  
  <header class="top-bar">
    <div class="logo">Nicole Designer <small>v20</small></div>
    <div class="actions">
      <button class="btn-mode" [class.is-runtime]="builder.isRuntimeMode()" (click)="builder.toggleMode()">
        {{ builder.isRuntimeMode() ? '🛠 Quitter le mode Test' : '▶ Lancer le Test' }}
      </button>
      @if (!builder.isRuntimeMode()) {
        <button (click)="builder.saveProject()" style="margin-left: 10px; cursor: pointer;">💾 Exporter JSON</button>
      }
    </div>
  </header>

  <div class="main-content">
    @if (!builder.isRuntimeMode()) {
      <aside class="sidebar-left">
        <section>
          <h4>Composants</h4>
          <div class="palette" style="display: grid; gap: 10px;">
            <button (click)="builder.addComponent('input')">Champ Texte</button>
            <button (click)="builder.addComponent('date')">Date</button>
            <button (click)="builder.addComponent('button')">Bouton</button>
            <button (click)="builder.addComponent('combo')">Liste</button>
          </div>
        </section>
        
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

        <section>
          <h4>Navigation</h4>
          @for (s of builder.screens(); track s.id) {
            <div class="screen-item" [class.active]="builder.currentScreenId() === s.id" (click)="builder.currentScreenId.set(s.id)">
              📄 {{ s.name }}
            </div>
          }
          <button (click)="builder.addScreen('Nouvel écran')" style="width: 100%; margin-top: 10px;">+ Ajouter Écran</button>
        </section>
      </aside>
    }

    <main class="canvas-area">
      <div class="phone-frame">
        <div class="screen-content">
          @for (comp of builder.activeScreen()?.components; track comp.id) {
            <div class="comp-wrapper" 
                 [class.selected]="builder.selectedComponentId() === comp.id"
                 (click)="!builder.isRuntimeMode() && builder.selectedComponentId.set(comp.id)">
              <app-dynamic-renderer [config]="comp" />
            </div>
          }
        </div>
      </div>
    </main>

    @if (!builder.isRuntimeMode()) {
      <aside class="sidebar-right">
        <app-inspector />
      </aside>
    }
  </div>
</div>
